<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" role="img" aria-label="Custos">
  <!-- Aperture: a broken guardian ring + brass core. Padded so strokes never clip. -->
  <circle cx="40" cy="40" r="28" stroke="#3a9d8e" stroke-width="4.5"/>
  <!-- gap carved on the right (the C opening) -->
  <path d="M56 27 A28 28 0 1 0 56 53" stroke="#0b0e0d" stroke-width="11" fill="none"/>
  <path d="M56 27 A28 28 0 1 0 56 53" stroke="#3a9d8e" stroke-width="4.5" fill="none"/>
  <!-- protected core -->
  <circle cx="40" cy="40" r="6.5" fill="#c9a24b"/>
</svg>
